<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2f3e2c, #3f5239);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: #ff4d4d;
            padding: 8px 14px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            color: black;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
        }

        th {
            background: #2f3e2c;
            color: white;
        }

        a {
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .edit-btn {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>Admin Dashboard</h1>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>

    <h2>Total Registered Users: {{ total_users }}</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Background</th>
            <th>Actions</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.phone }}</td>
            <td>{{ user.background }}</td>
            <td>
                <a href="{{ url_for('edit_user', user_id=user.id) }}" class="edit-btn">Edit</a>
                <a href="{{ url_for('delete_user', user_id=user.id) }}"
                   class="delete-btn"
                   onclick="return confirm('Delete this user?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
