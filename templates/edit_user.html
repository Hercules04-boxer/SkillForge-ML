<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f9; }
        h1 { color: #333; }
        form { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .flash { padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        a { display: inline-block; margin-bottom: 10px; color: #333; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Edit User</h1>
    <a href="{{ url_for('admin') }}">← Back to Admin Panel</a>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="name" placeholder="Name" value="{{ user.name }}" required>
        <input type="text" name="phone" placeholder="Phone" value="{{ user.phone }}" required>
        <input type="email" name="email" placeholder="Email" value="{{ user.email }}" required>
        <input type="password" name="password" placeholder="New Password (leave blank to keep current)">
        <input type="text" name="background" placeholder="Background" value="{{ user.background }}">
        <button type="submit">Update User</button>
    </form>

</body>
</html>
