<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #4a5b3b, #7a8c69);
        }

        .login-container {
            position: relative;
            width: 350px;
            padding: 50px 30px 30px 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .login-container .icon-circle{
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container .icon-circle img {
            width: 35px;
            height: 35px;
        }

        .login-container h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-field {
            position: relative;
            margin-bottom: 20px;
        }

        .input-field input {
            width: 100%;
            padding: 12px 40px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 14px;
        }

        .input-field img {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            width: 18px;
            opacity: 0.8;
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .options label {
            display: flex;
            align-items: center;
        }

        .options input[type="checkbox"] {
            margin-right: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .signup-text {
            margin-top: 20px;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        .signup-text a {
            color: #e0e0e0;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="login-container">
    <div class="icon-circle">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="user icon">
    </div>

    <h2>Login</h2>

    <form action="{{ url_for('login') }}" method="POST">

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="email icon">
            <input type="email" name="email" placeholder="Email ID" required>
        </div>

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="password icon">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="options">
            <label><input type="checkbox" name="remember"> Remember me</label>
            <a href="#" style="color:#e0e0e0;">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">LOGIN</button>

    </form>

    <p class="signup-text">
        Don’t have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
    </p>
</div>

</body>
</html>
