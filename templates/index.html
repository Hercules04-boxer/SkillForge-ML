<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QueryDesk: A Smart Virtual Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background: 
        linear-gradient(rgba(31, 142, 57, 0.6), rgba(0, 0, 0, 0.6)),
        url("{{ url_for('static', filename='uploads/images/Background.gif.gif') }}") 
        no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 40px;
      text-shadow: 0px 0px 10px #00f0ff;
    }
    .button-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 15px 30px;
      font-size: 1.2em;
      border: 2px solid #00f0ff;
      background-color: transparent;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #00f0ff;
    }
    .btn:hover {
      background-color: #00f0ff;
      color: #000;
    }
    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9em;
      color: #ccc;
      text-shadow: 0px 0px 5px #000;
    }
    /* Floating Contact Button */
    .contact-wrapper {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .contact-icon {
      background-color: #00f0ff;
      color: black;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      cursor: pointer;
      box-shadow: 0 0 15px #00f0ff;
      transition: background-color 0.3s, transform 0.3s;
      animation: pulse 1.5s infinite;
    }
    .contact-icon:hover {
      background-color: white;
      transform: scale(1.1);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    /* Tooltip */
    .tooltip {
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      width: 220px;
      background-color: rgba(0, 0, 0, 0.85);
      color: #fff;
      text-align: left;
      padding: 10px;
      border-radius: 5px;
      position: absolute;
      top: 60px;
      right: 0;
      font-size: 0.9em;
      box-shadow: 0 0 10px #00f0ff;
      z-index: 10;
      pointer-events: none;
    }
    .contact-wrapper:hover .tooltip {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <!-- Floating Contact Button -->
  <div class="contact-wrapper">
    <div class="contact-icon">
      <i class="fas fa-envelope"></i>
    </div>
    <div class="tooltip">
      <strong>Email:</strong> example@email.com<br>
      <strong>Phone:</strong> +91 9876543210
    </div>
  </div>

  <h1>SkillsForge ML: Automated Intelligence Interview System For Analyzing Skills Using Machine learning Approach.</h1>
  <div class="button-container">
    <a href="/login"><button class="btn">Login</button></a>
    <a href="/signup"><button class="btn">Signup</button></a>
    <a href="/about"><button class="btn">About Us</button></a>
  </div>

  <footer>
  </footer>
</body>
</html>
