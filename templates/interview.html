<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Page - SkillsForge ML</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #4a5b3b, #7a8c69);
            padding: 30px 0;
        }

        .container {
            width: 95%;
            max-width: 800px;
            margin: auto;
            padding: 35px 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(12px);
            color: #fff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        h2,
        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            color: #eee;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .media-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        video,
        audio {
            flex: 1 1 48%;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        #generatedQuestions {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Create Interview</h2>

        <label>Interview Name</label>
        <input type="text" id="interviewName" placeholder="e.g., Java, Civil Engineering">

        <label>Objectives (comma separated)</label>
        <textarea rows="3" id="objectives" placeholder="e.g., Inheritance, Polymorphism"></textarea>

        <label>Number of Questions</label>
        <input type="number" min="1" id="numQuestions" value="5">

        <label>Duration (minutes)</label>
        <input type="number" min="1" id="duration" value="30">

        <button id="generateQuestions">Generate Questions</button>

        <div id="generatedQuestions"></div>

        <div class="media-container">
            <video id="webcam" autoplay muted></video>
            <audio id="audio" controls></audio>
        </div>

        <button id="startInterview">🎤 Start Interview</button>
        <button id="stopInterview">⏹ Stop Interview</button>

        <div id="analysis" style="margin-top:20px;">
            <h3>AI Analysis</h3>
            <p>Marks: <span>0</span></p>
            <p>Accuracy: <span>0%</span></p>
        </div>
    </div>

    <script>
        /* ---------------- Webcam ---------------- */
        const webcam = document.getElementById("webcam");
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => webcam.srcObject = stream)
            .catch(err => alert("Webcam error: " + err.message));

        /* ---------------- Voice Recording ---------------- */
        let recorder, audioStream, chunks = [];
        const audioEl = document.getElementById("audio");

        async function startRecording() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                recorder = new MediaRecorder(audioStream, { mimeType: "video/webm" });
                chunks = [];

                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: "video/webm" });

                    // Handle video playback
                    let videoEl = document.getElementById("recordedVideo");
                    if (!videoEl) {
                        videoEl = document.createElement("video");
                        videoEl.id = "recordedVideo";
                        videoEl.controls = true;
                        videoEl.style.flex = "1 1 48%";
                        videoEl.style.borderRadius = "10px";
                        videoEl.style.background = "rgba(255,255,255,0.1)";

                        // Insert after webcam
                        const container = document.querySelector(".media-container");
                        const audioEl = document.getElementById("audio");
                        if (audioEl) audioEl.remove(); // Remove audio element
                        container.appendChild(videoEl);

                        // Add transcription container
                        if (!document.getElementById("transcription")) {
                            const transDiv = document.createElement("div");
                            transDiv.id = "transcription";
                            transDiv.style.marginTop = "20px";
                            transDiv.style.padding = "15px";
                            transDiv.style.background = "rgba(255,255,255,0.1)";
                            transDiv.style.borderRadius = "10px";
                            transDiv.innerHTML = "<h3>Analysis</h3><p>Waiting for recording to finish...</p>";
                            document.querySelector(".container").appendChild(transDiv);
                        }
                    }
                    videoEl.src = URL.createObjectURL(blob);

                    // Auto-upload and Transcribe
                    const transDiv = document.getElementById("transcription") || document.createElement("div");
                    if (!document.getElementById("transcription")) {
                        transDiv.id = "transcription";
                        transDiv.style.marginTop = "20px";
                        transDiv.style.padding = "15px";
                        transDiv.style.background = "rgba(255,255,255,0.1)";
                        transDiv.style.borderRadius = "10px";
                        document.querySelector(".container").appendChild(transDiv);
                    }

                    transDiv.innerHTML = "<h3>Analysis</h3><p>⏳ Uploading and Transcribing...</p>";

                    const formData = new FormData();
                    formData.append("audio", blob, "interview_video.webm");

                    try {
                        const response = await fetch("/upload_audio", {
                            method: "POST",
                            body: formData
                        });
                        const result = await response.json();

                        if (result.transcription) {
                            transDiv.innerHTML = `<h3>Analysis</h3>
                            <h4>Transcription:</h4>
                            <p style="background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;">${result.transcription}</p>`;
                        } else {
                            transDiv.innerHTML = `<h3>Analysis</h3><p>Error: ${result.error || "Unknown error"}</p>`;
                        }
                    } catch (err) {
                        transDiv.innerHTML = `<h3>Analysis</h3><p>Network Error: ${err.message}</p>`;
                    }
                };

                recorder.start();
                alert("🎤 Interview recording started");
            } catch (err) {
                alert("Microphone error: " + err.message);
            }
        }

        function stopRecording() {
            if (recorder && recorder.state !== "inactive") {
                recorder.stop();
                audioStream.getTracks().forEach(track => track.stop());
                alert("⏹ Interview stopped");
            }
        }

        document.getElementById("startInterview").onclick = startRecording;
        document.getElementById("stopInterview").onclick = stopRecording;

        /* ---------------- AI Question Generation ---------------- */
        document.getElementById("generateQuestions").addEventListener("click", async () => {
            const interviewName = document.getElementById("interviewName").value.trim();
            const objectives = document.getElementById("objectives").value.trim();
            const numQs = parseInt(document.getElementById("numQuestions").value);

            if (!interviewName || !objectives || !numQs) {
                alert("Please fill all fields correctly!");
                return;
            }

            const qContainer = document.getElementById("generatedQuestions");
            qContainer.innerHTML = "<p>Generating questions using AI...</p>";

            try {
                const response = await fetch("/generate-questions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ interviewName, objectives, numQs })
                });

                const data = await response.json();
                if (data.questions) {
                    qContainer.innerHTML = `<h3>Generated Questions</h3>
            <ol>${data.questions.map(q => `
                <li style="margin-bottom: 10px;">
                    <span>${q}</span>
                    <button onclick="playAudio(this, '${q.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" style="margin-left:10px; padding:5px 10px; font-size:12px; width:auto; display:inline-block;">🔊 Play</button>
                </li>`).join("")}
            </ol>`;
                } else if (data.error) {
                    qContainer.innerHTML = `<p style="color: red; font-weight: bold;">Error: ${data.error}</p>`;
                } else {
                    qContainer.innerHTML = "<p>Error generating questions.</p>";
                }
            } catch (err) {
                qContainer.innerHTML = `<p>Error: ${err.message}</p>`;
            }
        });
        async function playAudio(btn, text) {
            const originalText = btn.innerText;
            btn.innerText = "⏳ Loading...";
            btn.disabled = true;

            try {
                const response = await fetch("/generate-audio", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const audio = new Audio(URL.createObjectURL(blob));
                    audio.play();
                    btn.innerText = "▶ Playing...";
                    audio.onended = () => {
                        btn.innerText = originalText;
                        btn.disabled = false;
                    };
                } else {
                    const err = await response.json();
                    alert("Audio Error: " + (err.error || "Unknown error"));
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Network Error: " + err.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>

</body>

</html>
