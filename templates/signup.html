<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #4a5b3b, #7a8c69); /* Same as login */
        }

        .signup-container {
            position: relative;
            width: 350px;
            padding: 50px 30px 30px 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .signup-container .icon-circle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container .icon-circle img {
            width: 35px;
            height: 35px;
        }

        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-field {
            position: relative;
            margin-bottom: 20px;
        }

        .input-field input,
        .input-field select {
            width: 100%;
            padding: 12px 40px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 14px;
        }

        .input-field img {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            width: 18px;
            opacity: 0.8;
        }

        select option {
            color: #000;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .login-text {
            margin-top: 20px;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }

        .login-text a {
            color: #e0e0e0;
            font-weight: 600;
            text-decoration: none;
        }

        .login-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="signup-container">

    <div class="icon-circle">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828506.png" alt="signup icon">
    </div>

    <h2>Sign Up</h2>

    <form action="{{ url_for('signup') }}" method="POST">

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="user icon">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png" alt="phone icon">
            <input type="tel" name="phone" placeholder="Phone Number" pattern="[0-9]{10}">
        </div>

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="email icon">
            <input type="email" name="email" placeholder="Email ID" required>
        </div>

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="password icon">
            <input type="password" name="password" placeholder="Password" required minlength="6">
        </div>

        <div class="input-field">
            <img src="https://cdn-icons-png.flaticon.com/512/2942/2942909.png" alt="study icon">
            <select name="background" required>
                <option value="">Study Background</option>
                <option>B.Tech Computer Science</option>
                <option>B.Tech IT</option>
                <option>B.Tech Mechanical</option>
                <option>B.Tech Civil</option>
                <option>B.Tech Electrical</option>
                <option>B.Tech AI & ML</option>
                <option>B.Sc Data Science</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>M.Tech</option>
                <option>Other</option>
            </select>
        </div>

        <button type="submit" class="signup-btn">CREATE ACCOUNT</button>

    </form>

    <p class="login-text">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>

</div>

</body>
</html>
